    }

    /* ── Header ─────────────────────────────────────────── */

      display: flex;
      align-items: center;

    .header-logo {

    .header-title {

      text-decoration: none;
      font-size: 12px;

    .view-site-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .refresh-btn {

      align-items: center;
      gap: 6px;
      background: transparent;
      color: rgba(255,255,255,0.7);

      font-size: 12px;
      font-weight: 600;

    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn .refresh-icon { display: inline-block; transition: transform 0.15s; }
    .refresh-btn.loading .refresh-icon { animation: spin 0.7s linear infinite; }

    /* Per-card loading overlay */

    .card-loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-size: 11px;
      font-weight: 600;
      color: var(--navy);

    }
    .card-loading-overlay::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);

      border-radius: 50%;

<script>
// ── Configuration ─────────────────────────────────────────
const BASE_DOMAIN = 'greyradius.com';
const PROD_BASE = 'https://' + BASE_DOMAIN;

const OG_TITLE_LIMIT = 60;   // LinkedIn/Facebook truncate ~60 chars
const OG_DESC_LIMIT  = 160;  // Most platforms truncate ~160 chars

// ── Live meta-tag fetcher ─────────────────────────────────
// Fetches the page HTML and extracts og:* and twitter:* meta tags.
async function fetchMeta(path) {
  try {
    const resp = await fetch(path, { cache: 'no-store' });
    if (!resp.ok) return { fetchError: resp.status };
    const html = await resp.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const get = (attr, val) => {
      const el = doc.querySelector(`meta[${attr}="${val}"]`);
      return el ? (el.getAttribute('content') || '') : '';
    };
    return {
      ogTitle: get('property', 'og:title'),
      ogDesc:  get('property', 'og:description'),
      ogImage: get('property', 'og:image'),
      twCard:  get('name', 'twitter:card'),
      twTitle: get('name', 'twitter:title'),
      twDesc:  get('name', 'twitter:description'),
    };
  } catch (err) {
    return { fetchError: String(err) };
  }
}

// ── Helpers ──────────────────────────────────────────────
function getIssues(p) {
  const issues = [];
  if (p.fetchError) {
    issues.push({ sev: 'error', msg: `Fetch failed (${p.fetchError})` });
    return issues;
  }
  if (!p.ogTitle) {
    issues.push({ sev: 'error', msg: 'Missing og:title' });
  } else if (p.ogTitle.length > OG_TITLE_LIMIT) {
    issues.push({ sev: 'warn', msg: `og:title too long (${p.ogTitle.length}/${OG_TITLE_LIMIT} chars – may be truncated)` });
  }
  if (!p.ogDesc) {
    issues.push({ sev: 'error', msg: 'Missing og:description' });
  } else if (p.ogDesc.length > OG_DESC_LIMIT) {
    issues.push({ sev: 'warn', msg: `og:description too long (${p.ogDesc.length}/${OG_DESC_LIMIT} chars – may be truncated)` });
  }
  if (!p.ogImage) issues.push({ sev: 'error', msg: 'Missing og:image' });
  if (!p.twCard) issues.push({ sev: 'warn', msg: 'No Twitter Card tags' });
  else {
    if (!p.twTitle) issues.push({ sev: 'warn', msg: 'Missing twitter:title' });
    if (!p.twDesc)  issues.push({ sev: 'warn', msg: 'Missing twitter:description' });
  }
  return issues;
}

function charBar(len, limit) {
  const pct = Math.min(len / limit, 1);
  const color = len > limit ? 'var(--red)' : len > limit * 0.85 ? 'var(--amber)' : 'var(--green)';
  return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:${color};font-weight:600">`
    + `<span style="display:inline-block;width:40px;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden">`
    + `<span style="display:block;width:${Math.round(pct*100)}%;height:100%;background:${color};border-radius:2px"></span></span>`
    + `${len}/${limit}</span>`;
}

function getBadge(issues) {
  const errors = issues.filter(i => i.sev === 'error').length;
  const warns  = issues.filter(i => i.sev === 'warn').length;
  if (errors === 0 && warns === 0) return '<span class="badge badge-ok">Complete</span>';
  if (errors > 0) return `<span class="badge badge-error">${errors} missing</span>`;
  return `<span class="badge badge-warn">${warns} warning</span>`;
}

function prodUrl(p) { return p.ogUrl || (PROD_BASE + p.path); }
function enc(s) { return encodeURIComponent(s); }

// ── Render LinkedIn card ─────────────────────────────────
function renderLinkedin(p) {
  const img = p.ogImage || '';
  const imgHtml = img
    ? `<img class="li-image" src="${img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="li-image-placeholder" style="display:none">🖼️</div>`
    : `<div class="li-image-placeholder">🖼️</div>`;
  const titleBar = p.ogTitle ? charBar(p.ogTitle.length, OG_TITLE_LIMIT) : '';
  const descBar  = p.ogDesc  ? charBar(p.ogDesc.length,  OG_DESC_LIMIT)  : '';
  return `
    <div class="li-card">
      ${imgHtml}
      <div class="li-body">
        <div class="li-domain">${BASE_DOMAIN}</div>
        <div class="li-title${!p.ogTitle ? ' missing' : ''}">${p.ogTitle || '(no og:title – will use page &lt;title&gt; or nothing)'}</div>
        ${titleBar ? `<div style="margin:-2px 0 4px">${titleBar}</div>` : ''}
        <div class="li-desc${!p.ogDesc ? ' missing' : ''}">${p.ogDesc || '(no og:description – LinkedIn may scrape body text)'}</div>
        ${descBar ? `<div style="margin-top:4px">${descBar}</div>` : ''}
      </div>
    </div>`;
}

// ── Render Twitter/X card ────────────────────────────────
function renderTwitter(p) {
  if (!p.twCard) {
    return `<div class="tw-no-card">
      <strong>No Twitter Card</strong>
      twitter:card tag is missing – link will appear as plain text, no preview image.
    </div>`;
  }
  const img = p.ogImage || '';
  const imgHtml = img
    ? `<img class="tw-image" src="${img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="tw-image-placeholder" style="display:none">🖼️</div>`
    : `<div class="tw-image-placeholder">🖼️</div>`;
  return `
    <div class="tw-card">
      ${imgHtml}
      <div class="tw-body">
        <div class="tw-domain">${BASE_DOMAIN}</div>
        <div class="tw-title${!p.twTitle && !p.ogTitle ? ' missing' : ''}">${p.twTitle || p.ogTitle || '(no twitter:title)'}</div>
        <div class="tw-desc${!p.twDesc && !p.ogDesc ? ' missing' : ''}">${p.twDesc || p.ogDesc || '(no twitter:description)'}</div>
      </div>
    </div>`;
}

// ── Render Slack card ────────────────────────────────────
function renderSlack(p) {
  const img = p.ogImage || '';
  const imgHtml = img
    ? `<img class="sl-image" src="${img}" alt="" onerror="this.style.display='none'">`
    : '';
  return `
    <div class="sl-card">
      <div class="sl-site">GreyRadius Consulting</div>
      <span class="sl-title${!p.ogTitle ? ' missing' : ''}">${p.ogTitle || '(no og:title – Slack will use page title)'}</span>
      <div class="sl-desc${!p.ogDesc ? ' missing' : ''}">${p.ogDesc || '(no og:description)'}</div>
      ${imgHtml}
    </div>`;
}

// ── Build & render cards ──────────────────────────────────
let currentView = 'linkedin';
let currentFilter = 'all';
let enrichedPages = [];

function renderCards(pages) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let total = 0, complete = 0, withIssues = 0, noImage = 0;

  pages.forEach(p => {
    const issues = getIssues(p);
    const isComplete = issues.length === 0;

    if (isComplete) complete++; else withIssues++;
    if (!p.ogImage) noImage++;
    total++;

    const purl = prodUrl(p);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.section = p.section;
    card.dataset.hasIssues = issues.length > 0 ? '1' : '0';
    card.dataset.path = p.path;

    const issuesHtml = issues.length > 0 ? `
      <div class="issues">
        <div class="issues-title">Issues detected</div>
        ${issues.map(i => `
          <div class="issue-item ${i.sev === 'warn' ? 'warn' : ''}">
            <span class="issue-icon">${i.sev === 'error' ? '✗' : '⚠'}</span>
            ${i.msg}
          </div>`).join('')}
      </div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <span class="page-path">${p.path}</span>
        ${getBadge(issues)}
      </div>
      <div class="platform-tabs" role="tablist">
        <button class="platform-tab ${currentView === 'linkedin' ? 'active' : ''}" data-view="linkedin" role="tab">
          <span class="tab-icon">in</span> LinkedIn
        </button>
        <button class="platform-tab ${currentView === 'twitter' ? 'active' : ''}" data-view="twitter" role="tab">
          <span class="tab-icon">𝕏</span> Twitter/X
        </button>
        <button class="platform-tab ${currentView === 'slack' ? 'active' : ''}" data-view="slack" role="tab">
          <span class="tab-icon">⚡</span> Slack
        </button>
      </div>
      <div class="preview-panel ${currentView === 'linkedin' ? 'active' : ''}" data-panel="linkedin">
        ${renderLinkedin(p)}
      </div>
      <div class="preview-panel ${currentView === 'twitter' ? 'active' : ''}" data-panel="twitter">
        ${renderTwitter(p)}
      </div>
      <div class="preview-panel ${currentView === 'slack' ? 'active' : ''}" data-panel="slack">
        ${renderSlack(p)}
      </div>
      ${issuesHtml}
      <div class="card-footer">
        <a class="debugger-link fb" href="https://developers.facebook.com/tools/debug/?q=${enc(purl)}" target="_blank" rel="noopener">FB Debugger ↗</a>
        <a class="debugger-link li" href="https://www.linkedin.com/post-inspector/inspect/${enc(purl)}" target="_blank" rel="noopener">LI Inspector ↗</a>
        <a class="debugger-link tw" href="https://cards-dev.twitter.com/validator" target="_blank" rel="noopener">TW Validator ↗</a>
        <a class="debugger-link og" href="https://opengraph.io/api/1.1/site/${enc(purl)}?app_id=preview" target="_blank" rel="noopener">OG.io ↗</a>
        <a class="debugger-link" href="${p.path}" target="_blank" rel="noopener">View page ↗</a>
      </div>`;

    card.querySelectorAll('.platform-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const view = tab.dataset.view;
        card.querySelectorAll('.platform-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
        card.querySelectorAll('.preview-panel').forEach(panel => panel.classList.toggle('active', panel.dataset.panel === view));
      });
    });

    grid.appendChild(card);
  });

  updateStats(total, complete, withIssues, noImage, pages.length);
  applyFilter();
}

function applyFilter() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    let show = true;
    if (currentFilter !== 'all') {
      show = currentFilter === 'issues'
        ? card.dataset.hasIssues === '1'
        : card.dataset.section === currentFilter;
    }
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  const empty = document.querySelector('.empty-state');
  if (visible === 0 && !empty) {
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.innerHTML = '<strong>No pages found</strong>No pages match this filter.';
    document.getElementById('grid').appendChild(div);
  } else if (visible > 0 && empty) {
    empty.remove();
  }

  document.getElementById('summaryCounts').innerHTML =
    `Showing <strong>${visible}</strong> of <strong>${enrichedPages.length}</strong> pages`;
}

function updateStats(total, complete, withIssues, noImage, allTotal) {
  const stats = document.getElementById('statsBar');
  const pct = total > 0 ? Math.round(complete / total * 100) : 0;
  const now = new Date();
  const fetchedAt = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  stats.innerHTML = `
    <div class="stat"><span class="stat-dot green"></span><strong>${complete}</strong> fully complete (${pct}%)</div>
    <div class="stat"><span class="stat-dot red"></span><strong>${withIssues}</strong> with issues</div>
    <div class="stat"><span class="stat-dot amber"></span><strong>${noImage}</strong> missing og:image</div>
    <div class="stat"><span class="stat-dot"></span><strong>${allTotal}</strong> total pages</div>
    <div class="stat stat-fetched-at" style="margin-left:auto;opacity:0.6;font-size:0.82em;">Fetched at ${fetchedAt}</div>
  `;
}

// ── Global view toggle ───────────────────────────────────
function setGlobalView(view) {
  currentView = view;
  ['Linkedin','Twitter','Slack'].forEach(v =>
    document.getElementById('view' + v).classList.toggle('active', view === v.toLowerCase())
  );
  document.querySelectorAll('.platform-tab').forEach(tab =>
    tab.classList.toggle('active', tab.dataset.view === view)
  );
  document.querySelectorAll('.preview-panel').forEach(panel =>
    panel.classList.toggle('active', panel.dataset.panel === view)
  );
}

document.getElementById('viewLinkedin').addEventListener('click', () => setGlobalView('linkedin'));
document.getElementById('viewTwitter').addEventListener('click', () => setGlobalView('twitter'));
document.getElementById('viewSlack').addEventListener('click', () => setGlobalView('slack'));

// ── Filter buttons ───────────────────────────────────────
document.getElementById('filterGroup').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  applyFilter();
});

    </div>
    <div class="preview-panel ${currentView === 'twitter' ? 'active' : ''}" data-panel="twitter">

      <a class="debugger-link fb" href="https://developers.facebook.com/tools/debug/?q=${enc(purl)}" target="_blank" rel="noopener">FB Debugger ↗</a>
      <a class="debugger-link li" href="https://www.linkedin.com/post-inspector/inspect/${enc(purl)}" target="_blank" rel="noopener">LI Inspector ↗</a>
      <a class="debugger-link tw" href="https://cards-dev.twitter.com/validator" target="_blank" rel="noopener">TW Validator ↗</a>
      <a class="debugger-link og" href="https://opengraph.io/api/1.1/site/${enc(purl)}?app_id=preview" target="_blank" rel="noopener">OG.io ↗</a>

  card.querySelectorAll('.platform-tab').forEach(tab => {

      card.querySelectorAll('.preview-panel').forEach(panel => panel.classList.toggle('active', panel.dataset.panel === view));
    });
  });
}

// ── Init: fetch all pages in parallel ────────────────────
let isLoading = false;

async function init(isRefresh = false) {
  if (isLoading) return;
  isLoading = true;

  const grid = document.getElementById('grid');
  const refreshBtn = document.getElementById('refreshBtn');

  if (isRefresh) {
    refreshBtn.disabled = true;
    refreshBtn.classList.add('loading');
    // Add a loading overlay to every visible card
    document.querySelectorAll('.card').forEach(card => {
      const overlay = document.createElement('div');
      overlay.className = 'card-loading-overlay';
      card.appendChild(overlay);
    });
  } else {
    grid.innerHTML = `
      <div class="empty-state">
        <strong>Loading…</strong>
        Fetching meta tags from ${PAGES.length} pages – this takes a moment.
      </div>`;
  }

  enrichedPages = new Array(PAGES.length);

  await Promise.all(
    PAGES.map(async (route, i) => {
      const meta = await fetchMeta(route.path);
      enrichedPages[i] = { ...route, ...meta };

      if (isRefresh) {
        const card = grid.querySelector(`.card[data-path="${CSS.escape(route.path)}"]`);
        if (card) {
          updateCardContent(card, enrichedPages[i]);
        }
      }
    })
  );

  if (isRefresh) {
    // Tally updated stats
    let total = 0, complete = 0, withIssues = 0, noImage = 0;
    enrichedPages.forEach(p => {
      const issues = getIssues(p);
      if (issues.length === 0) complete++; else withIssues++;
      if (!p.ogImage) noImage++;
      total++;
    });
    updateStats(total, complete, withIssues, noImage, enrichedPages.length);
    applyFilter();
    refreshBtn.classList.remove('loading');
    refreshBtn.disabled = false;
  } else {
    renderCards(enrichedPages);
  }

  isLoading = false;
}

document.getElementById('refreshBtn').addEventListener('click', () => init(true));

init();
</script>
